<html lang="en">
<head>

<body>

    <h1>Contact</h1>

    <form action="mailto:your@email.com" method="get">
        <label>
            Name
            <input type="text" name="name" required>
        </label>
        <label>
            Email
            <input type="email" name="email" required>
        </label>
        <label>
            Message
            <textarea name="message" rows="6" required></textarea>
        </label>
        <button type="submit">Send</button>
    </form>
</body>
</html>
